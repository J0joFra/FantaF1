<!doctype html><html><head><meta charset="utf-8"><style>body{margin:0;background:#fff}</style></head><body>
<div id="host"></div>
<script>
function roundRectPath(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawBadge(ctx,x,y,s){roundRectPath(ctx,x,y,s,s,s*0.22);ctx.fillStyle="#fff";ctx.fill();ctx.save();roundRectPath(ctx,x,y,s,s,s*0.22);ctx.clip();ctx.strokeStyle="#dcdee4";ctx.lineWidth=s*0.05;[1/3,2/3].forEach(f=>{ctx.beginPath();ctx.moveTo(x+s*f,y);ctx.lineTo(x+s*f,y+s);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y+s*f);ctx.lineTo(x+s,y+s*f);ctx.stroke();});ctx.restore();ctx.fillStyle="#E8002D";ctx.font=`800 ${Math.round(s*0.4)}px Arial, sans-serif`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("F1",x+s/2,y+s/2+s*0.02);}
function buildBrandedCanvas(snap,{heading="GridUP",sub=""}={}){const W=1080,pad=40,headerH=180,footerH=78,badgeS=108;const innerW=W-pad*2;const scale=innerW/snap.width;const snapH=Math.round(snap.height*scale);const capH=sub?72:16;const contentTop=headerH+20+capH;const H=contentTop+snapH+24+footerH;const c=document.createElement("canvas");c.width=W;c.height=H;const ctx=c.getContext("2d");ctx.fillStyle="#eceef1";ctx.fillRect(0,0,W,H);const g=ctx.createLinearGradient(0,0,W,0);g.addColorStop(0,"#E8002D");g.addColorStop(1,"#B80024");ctx.fillStyle=g;ctx.fillRect(0,0,W,headerH);drawBadge(ctx,pad,(headerH-badgeS)/2,badgeS);ctx.textBaseline="alphabetic";ctx.textAlign="left";ctx.fillStyle="#fff";ctx.font='800 56px Arial, sans-serif';ctx.fillText("GridUP",pad+badgeS+26,headerH/2-4);ctx.fillStyle="rgba(255,255,255,0.85)";ctx.font='600 26px Arial, sans-serif';ctx.fillText(heading,pad+badgeS+28,headerH/2+32);if(sub){ctx.fillStyle="#111827";ctx.font='800 34px Arial, sans-serif';ctx.textAlign="center";ctx.fillText(sub,W/2,headerH+20+46,W-pad*2);}ctx.drawImage(snap,pad,contentTop,innerW,snapH);ctx.fillStyle="#9ca3af";ctx.font='600 24px Arial, sans-serif';ctx.textAlign="center";ctx.fillText("gridup-f1.web.app",W/2,H-30);return c;}
// fake snapshot
const snap=document.createElement("canvas");snap.width=760;snap.height=920;const s=snap.getContext("2d");s.fillStyle="#fff";s.fillRect(0,0,760,920);s.fillStyle="#f3f4f6";for(let i=0;i<10;i++)for(let j=0;j<10;j++){s.fillStyle=(i+j)%3===0?"#10b981":(i+j)%3===1?"#f59e0b":"#e5e7eb";roundRectPath(s,60+j*66,200+i*66,58,58,8);s.fill();}s.fillStyle="#111827";s.font="800 40px Arial";s.fillText("Mosaico strategie",60,90);s.fillStyle="#6b7280";s.font="400 24px Arial";s.fillText("Tocca una cella per i dettagli",60,140);
const card=buildBrandedCanvas(snap,{heading:"Mosaico strategie",sub:"Verstappen vs Leclerc"});
card.style.width=(card.width/2)+"px";document.getElementById("host").appendChild(card);
document.title="ready-"+card.width+"x"+card.height;
</script></body></html>
