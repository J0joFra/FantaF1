<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 500px; overflow: hidden; }
  body {
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(120% 140% at 85% 110%, rgba(0,0,0,0.18), transparent 60%),
      linear-gradient(135deg, #E8002D 0%, #C20028 55%, #9e0021 100%);
    display: flex; align-items: center; gap: 56px;
    padding: 0 72px; position: relative;
  }
  /* faint grid texture */
  body::before {
    content: ""; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 40%);
  }
  .icon {
    width: 248px; height: 248px; border-radius: 56px; flex: none;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35); position: relative; z-index: 1;
  }
  .txt { position: relative; z-index: 1; color: #fff; }
  .name { font-size: 104px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
  .name .up { color: #fff; }
  .tag {
    margin-top: 18px; font-size: 30px; font-weight: 600; line-height: 1.3;
    color: rgba(255,255,255,0.92); max-width: 560px;
  }
  .pill {
    display: inline-block; margin-top: 24px; padding: 8px 18px; border-radius: 999px;
    background: rgba(255,255,255,0.16); border: 1px solid rgba(255,255,255,0.35);
    font-size: 20px; font-weight: 700; letter-spacing: 1px; color: #fff;
  }
</style>
</head>
<body>
  <img class="icon" src="ICON_SRC" alt="GridUp" />
  <div class="txt">
    <div class="name">Grid<span class="up">Up</span></div>
    <div class="tag">Il Mondiale di Formula 1 in punti, scenari e classifiche.</div>
    <span class="pill">CLASSIFICHE • SCENARI • CONFRONTI</span>
  </div>
</body>
</html>
